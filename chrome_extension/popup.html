<!DOCTYPE html>
<html>

<head>
  <title>EasyEDA2KiCad Chrome Extension Settings</title>
  <style>
    body {
      width: 350px;
      padding: 10px;
      font-family: sans-serif;
      font-size: 13px;
    }

    label {
      display: block;
      margin-top: 8px;
      font-weight: bold;
    }

    .input-group {
      display: flex;
      gap: 5px;
      margin-top: 5px;
    }

    input[type="text"] {
      flex-grow: 1;
      padding: 5px;
    }

    button.browse-btn {
      padding: 5px 10px;
      background-color: #f0f0f0;
      border: 1px solid #ccc;
      cursor: pointer;
    }

    button.browse-btn:hover {
      background-color: #e0e0e0;
    }

    .options-container {
      margin-top: 15px;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }

    .checkbox-group {
      margin-top: 5px;
    }

    .checkbox-group label {
      display: flex;
      align-items: center;
      font-weight: normal;
      margin-top: 3px;
    }

    .checkbox-group input {
      margin-right: 8px;
    }

    button#saveBtn {
      margin-top: 15px;
      width: 100%;
      padding: 8px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button#saveBtn:hover {
      background-color: #0056b3;
    }

    .status {
      margin-top: 10px;
      font-size: 0.9em;
      color: green;
      display: none;
      text-align: center;
    }
  </style>
</head>

<body>
  <div style="display: flex; align-items: center; margin-bottom: 10px;">
    <img src="icon/32.png" alt="icon" style="margin-right: 8px;">
    <h3 style="margin: 0;">EasyEDA2KiCad</h3>
  </div>

  <label for="outputPath">Output Directory:</label>
  <div class="input-group">
    <input type="text" id="outputPath" placeholder="Absolute path...">
    <button id="browseBtn" class="browse-btn" title="Choose Folder">...</button>
  </div>

  <label for="libName">Library Name:</label>
  <div class="input-group">
    <input type="text" id="libName" placeholder="e.g. easyeda2kicad" value="easyeda2kicad">
  </div>

  <div class="options-container">
    <label>Export Options:</label>
    <div class="checkbox-group">
      <label><input type="checkbox" id="optSymbol" checked> Symbol</label>
      <label><input type="checkbox" id="optFootprint" checked> Footprint</label>
      <label><input type="checkbox" id="opt3D" checked> 3D Model</label>
    </div>

    <label>Advanced:</label>
    <div class="checkbox-group">
      <label><input type="checkbox" id="optOverwrite"> Overwrite Existing</label>
      <label><input type="checkbox" id="optV5"> Be compatible with KiCad v5 (Legacy)</label>
    </div>

    <label>Extension Settings:</label>
    <div class="checkbox-group">
      <label><input type="checkbox" id="optSearchPage" checked> Show buttons in Search Results</label>
    </div>
  </div>

  <button id="saveBtn">Save Settings</button>
  <div id="status" class="status">Settings Saved!</div>

  <script src="popup.js"></script>
</body>

</html>
